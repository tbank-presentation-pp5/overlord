global:
  scrape_interval: 30s

rule_files:
  - 'alert_rules.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

scrape_configs:
  - job_name: 'app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'app:8080'

  - job_name: 'alertmanager'
    static_configs:
      - targets:
          - 'alertmanager:9093'